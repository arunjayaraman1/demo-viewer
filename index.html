<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Demo Portal | Secure Access</title>
  <meta name="description" content="Secure portal to access custom client walkthroughs, product demos, and presentation decks.">
  <meta name="robots" content="noindex, nofollow"> <!-- Prevent search engines indexing client portal -->
  
  <!-- Font integration -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Animated background ambient lights -->
  <div class="ambient-glow bg-1"></div>
  <div class="ambient-glow bg-2"></div>
  <div class="ambient-glow bg-3"></div>

  <main class="portal-container">
    <div class="glass-card" id="access-card">
      <div class="card-header">
        <div class="logo-container">
          <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3b82f6" />
                <stop offset="50%" stop-color="#8b5cf6" />
                <stop offset="100%" stop-color="#ec4899" />
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="40" stroke="url(#logo-grad)" stroke-width="8" stroke-dasharray="180 60" />
            <path d="M35 50L45 60L65 40" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <h1 class="portal-title">Client Demo Portal</h1>
        <p class="portal-subtitle">Enter your secure access code to view custom decks and walkthroughs.</p>
      </div>

      <form id="access-form" class="access-form" novalidate>
        <div class="input-wrapper">
          <label for="access-code" class="input-label">Access Code</label>
          <input 
            type="text" 
            id="access-code" 
            name="access-code" 
            placeholder="e.g. ARUN123" 
            autocomplete="off" 
            required 
            spellcheck="false"
            autofocus
          />
          <div class="input-glow"></div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span class="btn-text">Verify & Enter</span>
          <span class="btn-loader"></span>
        </button>

        <div class="error-message" id="error-message" aria-live="polite">
          <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-text">Invalid access code. Please try again.</span>
        </div>
      </form>
    </div>
  </main>

  <footer class="portal-footer">
    <p>&copy; 2026 AI Labs. All rights reserved. Secure connection guaranteed.</p>
  </footer>

  <script src="/app.js" type="module" defer></script>
</body>
</html>
